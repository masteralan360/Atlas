name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  VITE_R2_WORKER_URL: ${{ secrets.VITE_R2_WORKER_URL }}
  VITE_R2_AUTH_TOKEN: ${{ secrets.VITE_R2_AUTH_TOKEN }}

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        settings:
          - platform: windows-latest
          - platform: ubuntu-latest

    runs-on: ${{ matrix.settings.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.platform == 'ubuntu-latest' && 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android' || '' }}

      - name: Java setup (Android only)
        if: matrix.settings.platform == 'ubuntu-latest'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android SDK setup (Android only)
        if: matrix.settings.platform == 'ubuntu-latest'
        uses: android-actions/setup-android@v3

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Restore google-services.json (Android only)
        if: matrix.settings.platform == 'ubuntu-latest'
        run: |
          mkdir -p src-tauri/gen/android/app
          echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 --decode > src-tauri/gen/android/app/google-services.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests boto3

      - name: Clear R2 Updates (Initial)
        if: matrix.settings.platform == 'windows-latest'
        run: python .github/scripts/r2_release_helper.py clear
        shell: bash
        env:
          VITE_R2_WORKER_URL: ${{ secrets.VITE_R2_WORKER_URL }}
          VITE_R2_AUTH_TOKEN: ${{ secrets.VITE_R2_AUTH_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

      - name: Build Windows
        if: matrix.settings.platform == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_REQUIRE_BACKEND_CONFIGURATION: "false"
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_R2_WORKER_URL: ${{ secrets.VITE_R2_WORKER_URL }}
          VITE_R2_AUTH_TOKEN: ${{ secrets.VITE_R2_AUTH_TOKEN }}
          VITE_NOVU_APP_ID: ${{ secrets.VITE_NOVU_APP_ID }}
          VITE_NOVU_API_URL: ${{ secrets.VITE_NOVU_API_URL }}
          VITE_NOVU_SOCKET_URL: ${{ secrets.VITE_NOVU_SOCKET_URL }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Atlas ${{ github.ref_name }}"
          includeUpdaterJson: true
          releaseBody: "See the assets to download this version and install."

      - name: Upload Windows Assets to R2
        if: matrix.settings.platform == 'windows-latest'
        run: python .github/scripts/r2_release_helper.py upload
        shell: bash
        env:
          VITE_R2_WORKER_URL: ${{ secrets.VITE_R2_WORKER_URL }}
          VITE_R2_AUTH_TOKEN: ${{ secrets.VITE_R2_AUTH_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

      - name: Build Android
        if: matrix.settings.platform == 'ubuntu-latest'
        run: npm run android:build:release
        env:
          VITE_REQUIRE_BACKEND_CONFIGURATION: "false"
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_R2_WORKER_URL: ${{ secrets.VITE_R2_WORKER_URL }}
          VITE_R2_AUTH_TOKEN: ${{ secrets.VITE_R2_AUTH_TOKEN }}
          VITE_NOVU_APP_ID: ${{ secrets.VITE_NOVU_APP_ID }}
          VITE_NOVU_API_URL: ${{ secrets.VITE_NOVU_API_URL }}
          VITE_NOVU_SOCKET_URL: ${{ secrets.VITE_NOVU_SOCKET_URL }}

      - name: Sign Release APK
        if: matrix.settings.platform == 'ubuntu-latest'
        run: |
          # Create keystore from secret
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.jks
          
          # Sign the universal production APK
          # Note: We use the universal release APK found in the output folder
          unsigned_apk=$(find src-tauri/gen/android/app/build/outputs/apk/universal/release -name "*.apk" | head -n 1)
          
          # Sign using apksigner
          ${ANDROID_HOME}/build-tools/34.0.0/apksigner sign --ks release.jks \
            --ks-pass pass:${{ secrets.ANDROID_KEY_PASSWORD }} \
            --ks-key-alias ${{ secrets.ANDROID_KEY_ALIAS }} \
            --out src-tauri/gen/android/app/build/outputs/apk/universal/release/Atlas_${{ github.ref_name }}.apk \
            "$unsigned_apk"

      - name: List APKs (Debug)
        if: matrix.settings.platform == 'ubuntu-latest'
        run: |
          echo "Listing all generated APKs (including signed release):"
          find src-tauri/gen/android/app/build/outputs/apk -name "*.apk"

      - name: Upload Android APKs
        if: matrix.settings.platform == 'ubuntu-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/Atlas_${{ github.ref_name }}.apk
            src-tauri/gen/android/app/build/outputs/apk/debug/*.apk
          tag_name: ${{ github.ref_name }}
          name: "Atlas ${{ github.ref_name }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: false

      - name: Upload Android Assets to R2
        if: matrix.settings.platform == 'ubuntu-latest'
        run: python .github/scripts/r2_release_helper.py upload
        shell: bash
        env:
          VITE_R2_WORKER_URL: ${{ secrets.VITE_R2_WORKER_URL }}
          VITE_R2_AUTH_TOKEN: ${{ secrets.VITE_R2_AUTH_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
